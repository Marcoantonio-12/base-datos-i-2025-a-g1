<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-3">Recuperar Contraseña</h3>

    <form (ngSubmit)="enviarCodigo()" #form="ngForm">
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          class="form-control"
          name="correo"
          [(ngModel)]="correo"
          placeholder="Ingresa tu correo"
          required
          [disabled]="cargando"
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="cargando || form.invalid"
      >
        {{ cargando ? 'Enviando...' : 'Enviar código' }}
      </button>
    </form>

    <div *ngIf="mensaje" class="mt-3">
      <div [ngClass]="{ 'alert alert-success': !error, 'alert alert-danger': error }">
        {{ mensaje }}
      </div>
    </div>

    <div class="text-center mt-3">
      <a routerLink="/login">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
